name: CI/CD

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE .

      - name: Push image
        run: docker push $IMAGE


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull $IMAGE

      - name: Run tests in container
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@host.docker.internal:5432/kubsu \
            $IMAGE pytest -v


  deploy:
    runs-on: self-hosted
    needs: test

    steps:
      - name: Deploy via SSH
        run: |
          ssh -p 58529 robinson@kubsu.tyvik.ru << 'EOF'
            podman login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            podman pull $IMAGE

            podman stop myapp-container || true
            podman rm myapp-container || true

            podman run -d \
              --name myapp-container \
              -p 60080:8097 \
              $IMAGE
          EOF
