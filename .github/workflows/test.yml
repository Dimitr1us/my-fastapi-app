name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (pip-based)
        run: |
          pip install -e .
          pip install pytest pytest-asyncio httpx sqlalchemy

      - name: Run tests
        run: |
          PYTHONPATH=. pytest
