name: CI/CD

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/dimitr1us/my-fastapi-app:latest

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE .

      - name: Push image
        run: docker push $IMAGE


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=kubsu \
            -e POSTGRES_PASSWORD=kubsu \
            -e POSTGRES_DB=kubsu \
            -p 5432:5432 \
            postgres:16

          echo "Waiting for Postgres..."
          for i in {1..20}; do
            docker exec postgres pg_isready -U kubsu && break
            sleep 2
          done

      - name: Pull image
        run: docker pull $IMAGE

      - name: Run tests in container
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
            $IMAGE pytest -v

      - name: Stop PostgreSQL
        if: always()
        run: docker stop postgres || true


  deploy:
    runs-on: self-hosted
    needs: test

    steps:
      - name: Deploy via SSH
        run: |
          ssh -p 58529 robinson@kubsu.tyvik.ru << 'EOF'
            podman login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            podman pull $IMAGE

            podman stop myapp-container || true
            podman rm myapp-container || true

            podman run -d \
              --name myapp-container \
              -p 60080:8097 \
              $IMAGE
          EOF
